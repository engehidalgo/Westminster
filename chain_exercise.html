<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speak English — Chain Exercise</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #1B2A4A; --red: #C8102E; --cream: #F7F3EC; --card: #FFFDF8;
    --border: #D5CBBA; --text: #1B2A4A; --muted: #6B7280;
    --gold: #B8960C; --gold-light: #FDF6DC;
    --green: #1A5C38; --green-light: #E6F4EC;
    --radius: 10px; --radius-sm: 6px;
  }
  body { font-family: 'Lato', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 0 0 4rem; }

  .banner { width: 100%; background: var(--navy); padding: 1.5rem 1rem 1.25rem; text-align: center; position: relative; }
  .banner::before, .banner::after { content: ''; position: absolute; top: 0; bottom: 0; width: 8px; }
  .banner::before { left: 0; background: var(--red); }
  .banner::after { right: 0; background: var(--red); }
  .banner .eyebrow { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: #9EAEC8; font-weight: 500; margin-bottom: 6px; }
  .banner h1 { font-family: 'Playfair Display', serif; font-size: 1.75rem; color: white; line-height: 1.2; margin-bottom: 6px; }
  .banner p { font-size: 13px; color: #9EAEC8; }
  .flag-strip { width: 100%; height: 6px; background: repeating-linear-gradient(90deg, var(--red) 0, var(--red) 33%, white 33%, white 66%, var(--navy) 66%, var(--navy) 100%); }

  .container { width: 100%; max-width: 580px; padding: 2rem 1rem 0; }

  .progress-wrap { margin-bottom: 1.5rem; }
  .progress-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .progress-bg { background: var(--border); border-radius: 99px; height: 4px; }
  .progress-fill { height: 4px; border-radius: 99px; background: var(--navy); transition: width 0.4s ease; }

  .voice-bar { display: flex; align-items: center; gap: 8px; padding: 8px 14px; background: var(--gold-light); border: 1px solid #E8D575; border-radius: var(--radius-sm); margin-bottom: 1rem; }
  .voice-status { font-size: 12px; color: var(--gold); flex: 1; }
  .voice-status.speaking { color: var(--green); font-weight: 500; }
  .voice-status.error { color: var(--red); }
  .replay-btn { padding: 4px 12px; border-radius: 99px; border: 1px solid var(--border); background: white; font-size: 12px; font-family: 'Lato', sans-serif; cursor: pointer; color: var(--text); transition: opacity 0.15s; }
  .replay-btn:disabled { opacity: 0.4; cursor: default; }

  .chain-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.75rem; margin-bottom: 1rem; box-shadow: 0 2px 12px rgba(27,42,74,0.06); border-top: 3px solid var(--navy); }

  .context-box { font-size: 13px; color: var(--muted); font-style: italic; margin-bottom: 1.25rem; padding: 10px 14px; background: var(--cream); border-radius: var(--radius-sm); border-left: 3px solid var(--border); line-height: 1.6; }

  .step { margin-bottom: 1.25rem; padding: 1rem 1.25rem; border-radius: var(--radius-sm); border: 1px solid var(--border); background: white; transition: all 0.3s; }
  .step.active { border-color: var(--navy); background: #F0F4FF; }
  .step.done-correct { border-color: var(--green); background: var(--green-light); }
  .step.done-wrong { border-color: var(--navy); background: #F0F4FF; }
  .step.skipped { opacity: 0.5; }

  .step-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .step-num { width: 22px; height: 22px; border-radius: 50%; background: var(--navy); color: white; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .step-num.correct { background: var(--green); }
  .step-num.wrong { background: var(--navy); }
  .step-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); font-weight: 500; }

  .step-instruction { font-size: 13px; color: var(--muted); margin-bottom: 8px; }
  .step-model { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--navy); margin-bottom: 10px; line-height: 1.4; }
  .step-model.hidden { filter: blur(4px); user-select: none; cursor: pointer; transition: filter 0.3s; }
  .step-model.hidden:hover { filter: blur(2px); }

  .step-transcript { font-size: 13px; color: var(--muted); font-style: italic; margin-top: 6px; min-height: 20px; }
  .step-transcript.has-text { color: var(--text); font-style: normal; }
  .step-result { font-size: 12px; margin-top: 6px; font-weight: 500; }
  .step-result.correct { color: var(--green); }
  .step-result.wrong { color: var(--navy); }

  .mic-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 14px; background: var(--navy); color: white; border: none; border-radius: var(--radius-sm); font-size: 15px; font-family: 'Lato', sans-serif; font-weight: 500; cursor: pointer; transition: all 0.3s; margin-top: 1rem; }
  .mic-btn:hover:not(:disabled) { opacity: 0.88; }
  .mic-btn.listening { background: var(--red); animation: pulse 1.2s infinite; }
  .mic-btn.correct { background: var(--green); animation: none; }
  .mic-btn:disabled { opacity: 0.4; cursor: default; animation: none; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.75; } }

  .nav-row { display: flex; justify-content: space-between; gap: 8px; margin-top: 1rem; }
  .nav-btn { padding: 10px 24px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: transparent; color: var(--text); font-size: 14px; font-family: 'Lato', sans-serif; cursor: pointer; transition: all 0.15s; }
  .nav-btn:hover:not(:disabled) { background: white; }
  .nav-btn:disabled { opacity: 0.35; cursor: default; }
  .nav-btn.primary { background: var(--navy); color: white; border-color: var(--navy); }
  .nav-btn.primary:hover:not(:disabled) { opacity: 0.88; }

  .score-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 2.5rem 1.5rem; text-align: center; box-shadow: 0 2px 12px rgba(27,42,74,0.08); border-top: 3px solid var(--navy); }
  .score-big { font-family: 'Playfair Display', serif; font-size: 4rem; color: var(--navy); line-height: 1; }
  .score-sub { font-size: 14px; color: var(--muted); margin-top: 4px; }
  .score-msg { font-size: 15px; color: var(--muted); margin-top: 1rem; }

  /* Confetti */
  .confetti-piece { position: fixed; width: 10px; height: 10px; border-radius: 2px; animation: confetti-fall 1.2s ease-in forwards; pointer-events: none; z-index: 9999; }
  @keyframes confetti-fall { 0% { transform: translateY(-20px) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
</style>
</head>
<body>

<div class="banner">
  <div class="eyebrow">Speak English</div>
  <h1>Chain Exercise</h1>
  <p>Listen · Transform · Think in English</p>
</div>
<div class="flag-strip"></div>

<div class="container">
  <div id="main-area"></div>
</div>

<script>
const ELEVENLABS_API_KEY = "sk_6a8e81eb8e5551d368e6f4e5b39c3af50bf29c808cc26e68";
const VOICE_ID = "KZte44ji3YPjXOWsbgVF";
const MODEL_ID = "eleven_turbo_v2";

const EXERCISES = [
  {
    context: "Someone is surprised that a person didn't pay.",
    steps: [
      { instruction: "Listen — Lady Chatterley says:", model: "How come he didn't pay?", speak: true, target: null },
      { instruction: "Now say the same idea — he had no desire to pay:", model: "How come he didn't want to pay?", speak: false, target: ["how come he didn't want to pay", "how come he did not want to pay"] },
      { instruction: "Now say the same idea — he actively refused:", model: "How come he refused to pay?", speak: false, target: ["how come he refused to pay"] }
    ]
  },
  {
    context: "You're sharing a surprising piece of news about an exam.",
    steps: [
      { instruction: "Listen — Lady Chatterley says:", model: "By the way, she didn't take the exam.", speak: true, target: null },
      { instruction: "Now say the same idea — she had no desire to take it:", model: "By the way, she didn't want to take the exam.", speak: false, target: ["by the way she didn't want to take the exam", "by the way she did not want to take the exam", "she didn't want to take the exam"] },
      { instruction: "Now say the same idea — she actively refused:", model: "By the way, she refused to take the exam.", speak: false, target: ["by the way she refused to take the exam", "she refused to take the exam"] }
    ]
  },
  {
    context: "You're telling a friend something surprising about money.",
    steps: [
      { instruction: "Listen — Lady Chatterley says:", model: "Don't tell me they didn't give you the money!", speak: true, target: null },
      { instruction: "Now say the same idea — they had no desire to give it:", model: "Don't tell me they didn't want to give you the money!", speak: false, target: ["don't tell me they didn't want to give you the money", "they didn't want to give you the money"] },
      { instruction: "Now say the same idea — they actively refused:", model: "Don't tell me they refused to give you the money!", speak: false, target: ["don't tell me they refused to give you the money", "they refused to give you the money"] }
    ]
  },
  {
    context: "You're explaining why something didn't get done.",
    steps: [
      { instruction: "Listen — Lady Chatterley says:", model: "That's why we didn't do it.", speak: true, target: null },
      { instruction: "Now say the same idea — you had no desire to do it:", model: "That's why we didn't want to do it.", speak: false, target: ["that's why we didn't want to do it", "we didn't want to do it", "that is why we didn't want to do it"] },
      { instruction: "Now say the same idea — you actively refused:", model: "That's why we refused to do it.", speak: false, target: ["that's why we refused to do it", "we refused to do it"] }
    ]
  }
];

let current = 0;
let currentStep = 0;
let stepResults = [];
let exerciseResults = Array(EXERCISES.length).fill(null);
let isListening = false;
let isSpeaking = false;
let currentAudio = null;
let recognition = null;

// ── Confetti ──
function launchConfetti() {
  const colors = ['#C8102E','#1B2A4A','#B8960C','#1A5C38','#ffffff'];
  for(let i = 0; i < 60; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.width = (8 + Math.random() * 8) + 'px';
      el.style.height = (8 + Math.random() * 8) + 'px';
      el.style.animationDuration = (0.8 + Math.random() * 0.8) + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1600);
    }, i * 20);
  }
}

// ── Tones ──
function playTone(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    if(type === 'correct') {
      osc.frequency.setValueAtTime(523, ctx.currentTime);
      osc.frequency.setValueAtTime(659, ctx.currentTime + 0.12);
      osc.frequency.setValueAtTime(784, ctx.currentTime + 0.24);
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.5);
    } else {
      osc.frequency.setValueAtTime(300, ctx.currentTime);
      osc.frequency.setValueAtTime(220, ctx.currentTime + 0.15);
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.35);
    }
  } catch(e) {}
}

// ── TTS ──
function setVoiceStatus(text, cls) {
  const el = document.getElementById('voice-status');
  if(el) { el.textContent = text; el.className = 'voice-status' + (cls ? ' ' + cls : ''); }
}
function setReplayDisabled(val) {
  const btn = document.getElementById('replay-btn');
  if(btn) btn.disabled = val;
}

async function speakText(text) {
  const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${VOICE_ID}`, {
    method: 'POST',
    headers: { 'xi-api-key': ELEVENLABS_API_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({
      text,
      model_id: MODEL_ID,
      voice_settings: { stability: 0.5, similarity_boost: 0.75, speed: 0.9 }
    })
  });
  if(!res.ok) throw new Error(res.status);
  const url = URL.createObjectURL(await res.blob());
  return url;
}

async function speakStep(stepIndex) {
  const ex = EXERCISES[current];
  const step = ex.steps[stepIndex];
  if(!step.speak) return;
  if(isSpeaking && currentAudio) { currentAudio.pause(); currentAudio = null; isSpeaking = false; }
  isSpeaking = true;
  setReplayDisabled(true);
  setVoiceStatus('Lady Chatterley is speaking...', 'speaking');
  try {
    const url = await speakText(step.model);
    await new Promise((resolve, reject) => {
      const audio = new Audio(url);
      currentAudio = audio;
      audio.onended = () => { URL.revokeObjectURL(url); resolve(); };
      audio.onerror = () => { URL.revokeObjectURL(url); reject(); };
      audio.play();
    });
    setVoiceStatus('Now it\'s your turn. Press the mic.', '');
    // auto advance to step 1
    if(stepIndex === 0) {
      currentStep = 1;
      renderExercise(false);
    }
  } catch(e) {
    setVoiceStatus('Voice error. Try Replay.', 'error');
  }
  isSpeaking = false;
  setReplayDisabled(false);
}

// ── Speech recognition ──
function normalize(str) {
  return str.toLowerCase().replace(/[.,!?']/g, '').replace(/\s+/g, ' ').trim();
}
function checkAnswer(spoken, targets) {
  const norm = normalize(spoken);
  return targets.some(t => norm.includes(normalize(t)));
}

function startListening() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR) { alert('Speech recognition is not supported in this browser.'); return; }
  recognition = new SR();
  recognition.lang = 'en-US';
  recognition.continuous = false;
  recognition.interimResults = true;

  const micBtn = document.getElementById('mic-btn');
  const transcriptEl = document.getElementById('step-transcript-' + currentStep);

  recognition.onstart = () => {
    isListening = true;
    if(micBtn) { micBtn.innerHTML = '⏹ Stop'; micBtn.classList.add('listening'); micBtn.classList.remove('correct'); }
    if(transcriptEl) { transcriptEl.textContent = 'Listening...'; transcriptEl.className = 'step-transcript'; }
  };

  recognition.onresult = (e) => {
    let final = '', interim = '';
    for(let i = e.resultIndex; i < e.results.length; i++) {
      if(e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    if(transcriptEl) { transcriptEl.textContent = final || interim; transcriptEl.className = 'step-transcript has-text'; }
    if(final) { recognition.stop(); evaluateStep(final); }
  };

  recognition.onerror = () => {
    isListening = false;
    if(micBtn) { micBtn.innerHTML = '🎤 Try again'; micBtn.classList.remove('listening'); }
    if(transcriptEl) transcriptEl.textContent = 'Could not hear you. Try again.';
  };

  recognition.onend = () => {
    isListening = false;
    if(micBtn && currentStep < EXERCISES[current].steps.length) {
      micBtn.innerHTML = '🎤 Try again';
      micBtn.classList.remove('listening');
    }
  };

  recognition.start();
}

function stopListening() { if(recognition) recognition.stop(); }

function evaluateStep(spoken) {
  const ex = EXERCISES[current];
  const step = ex.steps[currentStep];
  const correct = checkAnswer(spoken, step.target);

  stepResults[currentStep] = { spoken, correct };

  const stepEl = document.getElementById('step-' + currentStep);
  const resultEl = document.getElementById('step-result-' + currentStep);
  const numEl = document.getElementById('step-num-' + currentStep);
  const micBtn = document.getElementById('mic-btn');

  if(correct) {
    playTone('correct');
    if(stepEl) { stepEl.classList.remove('active'); stepEl.classList.add('done-correct'); }
    if(numEl) { numEl.classList.add('correct'); numEl.textContent = '✓'; }
    if(resultEl) { resultEl.textContent = '✓ Correct!'; resultEl.className = 'step-result correct'; }
    if(micBtn) { micBtn.classList.remove('listening'); micBtn.classList.add('correct'); micBtn.innerHTML = '✓ Correct!'; }

    // reveal model answer
    const modelEl = document.getElementById('step-model-' + currentStep);
    if(modelEl) modelEl.classList.remove('hidden');

    // advance to next step or finish
    const nextStep = currentStep + 1;
    if(nextStep < ex.steps.length) {
      setTimeout(() => {
        currentStep = nextStep;
        renderExercise(false);
      }, 800);
    } else {
      // all steps done
      launchConfetti();
      exerciseResults[current] = stepResults.filter(r => r && r.correct).length;
      const navRow = document.getElementById('nav-row');
      if(navRow) navRow.style.display = 'flex';
      setTimeout(() => {
        if(micBtn) { micBtn.disabled = true; }
      }, 100);
    }
  } else {
    playTone('wrong');
    if(resultEl) { resultEl.textContent = '✗ Try again — ' + step.model; resultEl.className = 'step-result wrong'; }
    // reveal model after wrong attempt
    const modelEl = document.getElementById('step-model-' + currentStep);
    if(modelEl) modelEl.classList.remove('hidden');
    if(micBtn) { micBtn.classList.remove('listening'); micBtn.innerHTML = '🎤 Try again'; }
  }
}

function renderExercise(autoSpeak) {
  const area = document.getElementById('main-area');

  // Score screen
  if(current >= EXERCISES.length) {
    const total = EXERCISES.reduce((a, ex) => a + ex.steps.filter(s => !s.speak).length, 0);
    const correct = exerciseResults.reduce((a, r) => a + (r || 0), 0);
    const pct = Math.round(correct / total * 100);
    area.innerHTML = `
      <div class="score-card">
        <div class="score-big">${correct}/${total}</div>
        <div class="score-sub">${pct}% correct</div>
        <div class="score-msg">${pct >= 80 ? "Excellent! You're thinking in English." : pct >= 60 ? 'Good effort! Keep practicing.' : 'Keep going — every attempt helps.'}</div>
        <div style="margin-top:1.5rem;"><button class="nav-btn primary" onclick="resetAll()">Try again</button></div>
      </div>`;
    return;
  }

  const ex = EXERCISES[current];
  const total = EXERCISES.length;
  const pct = (current / total * 100).toFixed(0);
  const allDone = exerciseResults[current] !== null;

  const stepsHTML = ex.steps.map((step, i) => {
    const isActive = i === currentStep && !allDone;
    const result = stepResults[i];
    const isDone = result !== null && result !== undefined;
    const cls = step.speak ? '' : isActive ? 'active' : isDone ? (result.correct ? 'done-correct' : 'done-wrong') : 'skipped';
    const numCls = isDone && !step.speak ? (result.correct ? 'correct' : 'wrong') : '';
    const numContent = isDone && !step.speak ? (result.correct ? '✓' : i+1) : i+1;
    const modelHidden = !step.speak && !isDone && !isActive ? 'hidden' : '';

    return `
      <div class="step ${cls}" id="step-${i}">
        <div class="step-header">
          <div class="step-num ${numCls}" id="step-num-${i}">${numContent}</div>
          <span class="step-label">${step.speak ? 'Listen' : 'Your turn'}</span>
        </div>
        <p class="step-instruction">${step.instruction}</p>
        <p class="step-model ${modelHidden}" id="step-model-${i}" onclick="this.classList.remove('hidden')">${step.model}</p>
        ${!step.speak ? `
          <div class="step-transcript ${isDone ? 'has-text' : ''}" id="step-transcript-${i}">${isDone ? result.spoken : ''}</div>
          <div class="step-result ${isDone ? (result.correct ? 'correct' : 'wrong') : ''}" id="step-result-${i}">${isDone ? (result.correct ? '✓ Correct!' : '✗ ' + step.model) : ''}</div>
        ` : ''}
      </div>`;
  }).join('');

  const showMic = !allDone && currentStep > 0 && currentStep < ex.steps.length;

  area.innerHTML = `
    <div class="progress-wrap">
      <div class="progress-meta"><span>Exercise ${current+1} of ${total}</span><span>${pct}% complete</span></div>
      <div class="progress-bg"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="voice-bar">
      <span>&#128266;</span>
      <span id="voice-status" class="voice-status">Loading voice...</span>
      <button class="replay-btn" id="replay-btn" onclick="speakStep(0)" disabled>&#9654; Replay</button>
    </div>
    <div class="chain-card">
      <div class="context-box">&#128161; ${ex.context}</div>
      ${stepsHTML}
      ${showMic ? `
        <button class="mic-btn" id="mic-btn" onclick="isListening ? stopListening() : startListening()">
          🎤 Press to speak
        </button>` : ''}
      ${allDone ? `<button class="mic-btn" disabled style="margin-top:1rem;">✓ Completed</button>` : ''}
    </div>
    <div class="nav-row" id="nav-row" style="${allDone ? 'display:flex' : 'display:none'}">
      <button class="nav-btn" onclick="navigate(-1)" ${current===0?'disabled':''}>← Previous</button>
      <button class="nav-btn primary" onclick="navigate(1)">${current===total-1?'See results':'Next →'}</button>
    </div>`;

  setReplayDisabled(false);
  setVoiceStatus('Press Replay to hear the phrase.', '');
}

function navigate(dir) {
  if(currentAudio) { currentAudio.pause(); currentAudio = null; }
  const next = current + dir;
  if(next < 0) return;
  if(next >= EXERCISES.length) { current = EXERCISES.length; renderExercise(false); return; }
  current = next;
  currentStep = 0;
  stepResults = [];
  renderExercise(true);
}

function resetAll() {
  current = 0; currentStep = 0; stepResults = [];
  exerciseResults = Array(EXERCISES.length).fill(null);
  renderExercise(true);
}

renderExercise(true);
</script>
</body>
</html>
